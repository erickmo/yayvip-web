name: yayvip_web
description: YayVIP Web Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.1.0

  # Network
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.3.2

  # Functional Programming (Either)
  dartz: ^0.10.1

  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.20.2
  logger: ^2.0.2+1
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.0

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/content/
  fonts: []
